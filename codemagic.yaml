workflows:
  ios-release:
    name: Folio iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: Folio
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.rork.reading-room
      xcode: latest
    scripts:
      - name: Create provisioning profile
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            app.rork.reading-room \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
      - name: Build and archive
        script: |
          xcode-project use-profiles
          xcodebuild clean archive \
            -project "Folio.xcodeproj" \
            -scheme "Folio" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Folio.xcarchive \
            CODE_SIGN_STYLE=Automatic
      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --archive-path build/Folio.xcarchive
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true