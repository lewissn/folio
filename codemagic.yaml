workflows:
  ios-release:
    name: Folio iOS Release
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.rork.reading-room
      vars:
        XCODE_PROJECT: "Folio.xcodeproj"
        XCODE_SCHEME: "Folio"
    scripts:
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild build -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            DEVELOPMENT_TEAM=$CM_TEAM_ID \
            CODE_SIGN_STYLE=Automatic
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration