workflows:
  ios-release:
    name: Folio iOS Release
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.rork.reading-room
    scripts:
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild clean build \
            -project "Folio.xcodeproj" \
            -scheme "Folio" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Folio.xcarchive \
            archive
    artifacts:
      - build/Folio.xcarchive